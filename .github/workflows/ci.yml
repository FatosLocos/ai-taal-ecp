name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Test
        run: pytest
      - name: Validate frozen ECP-6
        run: ecp6 --config config/ecp6.yaml validate
