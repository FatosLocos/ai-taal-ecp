channel:
  type: factor_local_discrete_fixed_length
  vocabulary_size: 8
  symbol_min: 0
  symbol_max: 7
  message_length: 4
  bits_per_symbol: null
  factor_alphabet_sizes: [8, 8, 4, 4]
  bits_per_symbol_by_factor: [3, 3, 2, 2]
  bits_per_message: 10

agents:
  sender:
    family: minimal_permutation_slot_sender
  receiver:
    family: factorized_permutation_slot_receiver
  translator:
    family: factorized_permutation_slot_receiver

training:
  discrete_estimator: straight_through_minimal_permutations

baselines:
  - ecp4_same_split_16_bit_factorized_control
  - ecp3_confirmatory
  - packed_factor_code_10_bit
  - handcrafted_compositional_code

metrics:
  diagnostic:
    - sender_binding_matrices
    - sender_atom_codebooks
    - receiver_binding_matrices
    - pair_accuracy_matrix
    - sender_message_agreement
    - sender_protocol_statistics
    - receiver_transfer_curve
    - seed_variance

outcome_thresholds:
  compositional_mean_reference: 0.8900390625
  paired_control_required: true
