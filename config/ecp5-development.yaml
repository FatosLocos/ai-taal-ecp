extends: ecp4.yaml

experiment:
  id: ecp5
  title: Ontwikkeling gekalibreerde universele 10-bitvertaler
  status: development_test_sealed
  frozen_at_utc: null
  parent_experiment: ecp4
  arm: exhaustive_binding_calibration
  objective: >-
    Behoud de perfecte minimale 10-bitpopulatie en maak onafhankelijke
    vertaling robuust door de factor-slotpermutatie exact uit uitsluitend
    gelabelde trainingsberichten af te leiden.

reproducibility:
  dataset_seed: 18072031

dataset:
  split_strategy: dual_held_out_size_texture_matchings
  train_meanings: 512
  validation_meanings: 256
  compositional_test_meanings: 256
  holdout_factors: [size, texture]
  held_out_factor_pairs: 4
  validation_held_out_factor_pairs: 4
  variants_per_held_out_pair: 64
  excluded_factor_pairs: []
  explicit_validation_factor_pairs:
    - {size: 0, texture: 0}
    - {size: 1, texture: 1}
    - {size: 2, texture: 2}
    - {size: 3, texture: 3}
  explicit_test_factor_pairs:
    - {size: 0, texture: 1}
    - {size: 1, texture: 2}
    - {size: 2, texture: 3}
    - {size: 3, texture: 0}

translator_training:
  binding_calibration:
    enabled: true
    method: exhaustive_mutual_information_over_24_permutations
    confidence: 8.0
    freeze: true

transfer:
  meaning_budgets: [32, 128, 256, 512]

baselines:
  - ecp5_same_split_without_binding_calibration
  - ecp4_confirmatory_population
  - packed_factor_code_10_bit
  - handcrafted_compositional_code

metrics:
  diagnostic:
    - translator_binding_calibration
    - sender_binding_matrices
    - sender_atom_codebooks
    - receiver_binding_matrices
    - pair_accuracy_matrix
    - sender_message_agreement
    - sender_protocol_statistics
    - receiver_transfer_curve
    - seed_variance

outcome_thresholds:
  compositional_mean_reference: 0.8900390625
  paired_control_required: true
