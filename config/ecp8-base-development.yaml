extends: ecp6-development.yaml

experiment:
  id: ecp8
  title: ECP-8 shared sealed development base
  status: development_test_sealed
  frozen_at_utc: null
  parent_experiment: ecp7
  arm: shared_sealed_base
  objective: >-
    Test whether two surplus unallocated channel bits let a weak-structure
    population learn an injective compositional protocol without restoring a
    factor-to-slot binding.

reproducibility:
  dataset_seed: 18072058

dataset:
  split_strategy: dual_explicit_fresh_color_shape_matchings
  train_meanings: 14336
  validation_meanings: 1024
  compositional_test_meanings: 1024
  holdout_factors: [color, shape]
  held_out_factor_pairs: 16
  validation_held_out_factor_pairs: 16
  variants_per_held_out_pair: 64
  excluded_factor_pairs: []
  explicit_validation_factor_pairs:
